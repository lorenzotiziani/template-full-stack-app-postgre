<h1 class="text-center my-4">BENVENUTO NELLA HOME</h1>

@if (isGraph) {
    <div style="max-width: 700px; margin: auto;">
        <div style="position: relative; height: 400px;">
            <canvas baseChart
                    [data]="barChartData"
                    [options]="barChartOptions"
                    [type]="barChartType">
            </canvas>
        </div>
        <button class="btn btn-primary mt-3" (click)="toggleView()">Show Table</button>
    </div>
} @else {
    <div style="max-width: 700px; margin: auto;">
        <table class="table table-striped table-bordered">
            <thead class="table-dark">
            <tr>
                <th>Mese</th>
                <th>Vendite</th>
            </tr>
            </thead>
            <tbody>
            @for (label of barChartData.labels; track $index; let i = $index) {
                <tr>
                    <td>{{ label }}</td>
                    <td>{{ barChartData.datasets[0].data[i] }}</td>
                </tr>
            }
            </tbody>
        </table>
        <button class="btn btn-primary mt-3" (click)="toggleView()">Show Graph</button>
    </div>
}
