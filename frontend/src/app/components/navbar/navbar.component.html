<nav class="navbar navbar-expand-lg app-navbar" data-bs-theme="dark">
  <div class="container-fluid">
    <a class="navbar-brand" routerLink="/" (click)="closeMenu()">Template</a>

    <button class="navbar-toggler"
            type="button"
            (click)="toggleMenu()"
            aria-label="Apri/chiudi menu di navigazione">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="navbar-collapse collapse" [class.show]="isMenuOpen">
      <ul class="navbar-nav ms-auto align-items-lg-center">
        @if (authSrv.isAuthenticated$ | async) {
          <li class="nav-item">
            <a class="nav-link"
               routerLink="/"
               routerLinkActive="active"
               [routerLinkActiveOptions]="{ exact: true }"
               (click)="closeMenu()">Home</a>
          </li>
          <li class="nav-item">
            <span class="nav-link user-email">{{ authSrv.getCurrentUserEmail() }}</span>
          </li>
          <li class="nav-item">
            <button class="btn btn-logout btn-sm ms-lg-2" (click)="logout()">Logout</button>
          </li>
        } @else {
          <li class="nav-item">
            <a class="nav-link"
               routerLink="/login"
               routerLinkActive="active"
               (click)="closeMenu()">Login</a>
          </li>
          <li class="nav-item">
            <a class="nav-link"
               routerLink="/register"
               routerLinkActive="active"
               (click)="closeMenu()">Registrati</a>
          </li>
        }
      </ul>
    </div>
  </div>
</nav>
